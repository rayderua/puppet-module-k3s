name: Puppet Module Workflow

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  validate:
    name: "PDK Validation"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PDK
        uses: puppetlabs/pdk-action@v3
        with:
          pdk-version: '3.4.0'

      - name: Run Validation
        run: pdk validate

  unit_tests:
    name: "PDK Unit Tests"
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      matrix:
        # Проверяем на разных версиях Puppet для уверенности
        puppet_version: ['7', '8']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PDK
        uses: puppetlabs/pdk-action@v3
        with:
          pdk-version: '3.4.0'

      - name: Run Unit Tests
        run: pdk test unit --puppet-version ${{ matrix.puppet_version }}

  build:
    name: "PDK Build"
    runs-on: ubuntu-latest
    needs: unit_tests
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PDK
        uses: puppetlabs/pdk-action@v3
        with:
          pdk-version: '3.4.0'

      - name: Build Module Package
        run: pdk build --skip-interview

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: pkg/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}